/* ----------------------------------------------------------------
   SMALL UI PRIMITIVES
-----------------------------------------------------------------*/
function Card({ className='', children, hover=true }) {
  // Let callers override background/border without losing to the default `bg-white`
  // (Tailwind resolves same-specificity conflicts by CSS source order, not class order).
  const bg = /\bbg-/.test(className) ? '' : 'bg-white';
  const bd = /\bborder-/.test(className) ? '' : 'border-sand-200';
  return (
    <div className={`${bg} rounded-2xl border ${bd} shadow-soft ${hover?'transition-shadow duration-200 hover:shadow-lift':''} ${className}`}>
      {children}
    </div>
  );
}

function SectionLabel({ children }) {
  return <p className="text-[11px] font-semibold uppercase tracking-[0.14em] text-ink-700/55">{children}</p>;
}

const TONE = {
  good:  { pill:'bg-brand-50 text-brand-700 border-brand-100',  dot:'bg-brand-500',  text:'text-brand-700' },
  stable:{ pill:'bg-sand-100 text-ink-700 border-sand-200',     dot:'bg-brand-400',  text:'text-ink-700' },
  watch: { pill:'bg-amber-50 text-amber-700 border-amber-100',  dot:'bg-amber-400',  text:'text-amber-700' },
};

function StatusPill({ status, tone }) {
  const t = TONE[tone] || TONE.stable;
  return (
    <span className={`inline-flex items-center gap-2 rounded-full border px-3.5 py-1.5 text-sm font-medium ${t.pill}`}>
      <span className={`relative flex h-2 w-2`}>
        <span className={`absolute inline-flex h-full w-full rounded-full ${t.dot} opacity-40 animate-ping`} style={{animationDuration:'2.4s'}}></span>
        <span className={`relative inline-flex h-2 w-2 rounded-full ${t.dot}`}></span>
      </span>
      {status}
    </span>
  );
}

function DeltaPill({ value, tone, suffix='' }) {
  const t = TONE[tone] || TONE.good;
  const up = value >= 0;
  return (
    <span className={`inline-flex items-center gap-1 text-xs font-semibold ${t.text}`}>
      <Icon name={up?'arrowup':'arrowdown'} className="w-3.5 h-3.5" />
      {Math.abs(value)}{suffix}
    </span>
  );
}

/* calm SVG line chart with soft area fill */
function LineChart({ series, tone='good', id }) {
  const W=240, H=64, pad=6;
  const min=Math.min(...series), max=Math.max(...series);
  const span=(max-min)||1;
  const stroke = tone==='watch' ? '#C99A4A' : '#4E8C7D';
  const fill   = tone==='watch' ? '#C99A4A' : '#4E8C7D';
  const pts = series.map((v,i)=>{
    const x = pad + i*(W-2*pad)/(series.length-1);
    const y = pad + (1-(v-min)/span)*(H-2*pad);
    return [x,y];
  });
  const line = pts.map(([x,y])=>`${x},${y}`).join(' ');
  const area = `${pad},${H-pad} ${line} ${W-pad},${H-pad}`;
  const last = pts[pts.length-1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-16" preserveAspectRatio="none">
      <defs>
        <linearGradient id={`g-${id}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={fill} stopOpacity="0.16"/>
          <stop offset="100%" stopColor={fill} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#g-${id})`} />
      <polyline points={line} fill="none" stroke={stroke} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" vectorEffect="non-scaling-stroke"/>
      <circle cx={last[0]} cy={last[1]} r="3.2" fill="#fff" stroke={stroke} strokeWidth="2" vectorEffect="non-scaling-stroke"/>
    </svg>
  );
}

          </p>

}

  const [sent, setSent] = useState(false);

  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div className="absolute inset-0 bg-ink-900/30 backdrop-blur-sm" onClick={onClose}></div>
      <div className="relative w-full sm:max-w-md bg-white rounded-t-3xl sm:rounded-2xl shadow-lift p-6 fade-up">
        {!sent ? (
          <React.Fragment>
            <div className="flex items-center gap-3">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-brand-50 text-brand-600"><Icon name="message"/></span>
              <div>
                <p className="font-serif text-lg text-ink-900">Message the care team</p>
                <p className="text-xs text-ink-700/55">{RESIDENT.community} · usually replies within 1 business day</p>
              </div>
            </div>
            <textarea value={text} onChange={e=>setText(e.target.value)} rows="4"
              className="mt-4 w-full rounded-xl border border-sand-200 p-3 text-sm text-ink-800 focus:outline-none focus:ring-2 focus:ring-brand-300 resize-none"/>

              <button onClick={onClose} className="px-4 py-2 rounded-xl text-sm font-medium text-ink-700 hover:bg-sand-100 transition-colors">Cancel</button>
              <button onClick={()=>setSent(true)} className="px-4 py-2 rounded-xl text-sm font-semibold bg-brand-600 text-white hover:bg-brand-700 transition-colors">Send message</button>
            </div>
          </React.Fragment>
        ) : (

            <span className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-brand-50 text-brand-600 mx-auto"><Icon name="check" className="w-7 h-7"/></span>

}

   TABS

  { id:'safety',  label:'Safety',       icon:'shield' },

  return (
    <div className="flex gap-1 overflow-x-auto no-scrollbar p-1 bg-sand-100 rounded-2xl border border-sand-200">
      {TABS.map(t=>{

          <button key={t.id} onClick={()=>setActive(t.id)}
            className={`flex items-center gap-2 whitespace-nowrap px-4 py-2.5 rounded-xl text-sm font-medium transition-all duration-200
              ${on ? 'bg-white text-brand-700 shadow-soft' : 'text-ink-700/65 hover:text-ink-800 hover:bg-white/60'}`}>

/* ----------------------------------------------------------------
   APP
-----------------------------------------------------------------*/
function buildSummary(monthId, d){
  const m = MONTHS.find(x=>x.id===monthId).label;
  const w = d.wellness;
  const L = [];
  L.push('SafelyYou — Family Trust Dashboard');
  L.push('Monthly Summary');
  L.push('========================================');
  L.push(`Resident:   ${RESIDENT.name}`);
  L.push(`Community:  ${RESIDENT.community}`);
  L.push(`Month:      ${m}`);
  L.push(`Status:     ${d.status}`);
  L.push('');
  L.push('SAFETY');
  L.push(`  Falls detected ............ ${d.safety.falls}`);
  L.push(`  Near-fall events .......... ${d.safety.nearFalls}`);
  L.push(`  Avg staff response ........ ${d.safety.responseMin} min`);
  L.push(`  Repeat incident risk ...... down ${Math.abs(d.safety.repeatRisk)}% vs last month`);
  L.push('');
  L.push('WELLNESS (score /100, change vs last month)');
  [w.sleep,w.night,w.mobility,w.engagement].forEach(x=>{
    L.push(`  ${(x.label+' ').padEnd(20,'.')} ${x.value}  (${x.delta>=0?'+':''}${x.delta})`);
  });
  L.push('');
  L.push('CARE TEAM ACTIONS');
  d.actions.forEach(a=> L.push(`  [${a.status}] ${a.title} (${a.date})`));
  L.push('');
  L.push('SUMMARY');
  L.push('  '+d.narrative.replace(/(.{72}\S*)\s/g,'$1\n  '));
  L.push('');
  L.push('Privacy: No video is shared with families. You receive summarized');
  L.push('care insights only; clinical details remain with the care team.');
  return L.join('\n');
}

function App(){
  const [monthId, setMonthId] = useState('2026-06');
  const [tab, setTab] = useState('safety');
  const [modal, setModal] = useState(false);
  const d = DATA[monthId];

  const onDownload = () => {
    const text = buildSummary(monthId, d);
    const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `SafelyYou_${RESIDENT.name.replace(/\W/g,'')}_${monthId}.txt`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="min-h-screen">
      <Header monthId={monthId} setMonthId={setMonthId} d={d} onDownload={onDownload} onMessage={()=>setModal(true)} />

      <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

        {/* Monthly narrative — always visible, the heart of family trust */}
        <Card hover={false} className="p-6 bg-gradient-to-br from-white to-brand-50/40">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="sparkline" className="w-4 h-4 text-brand-600"/>
            <SectionLabel>This month, in plain words</SectionLabel>
          </div>
          <p className="font-serif text-lg sm:text-xl text-ink-900 leading-relaxed max-w-3xl">{d.narrative}</p>
          <p className="text-xs text-ink-700/50 mt-3">Prepared by the {RESIDENT.community} care team with SafelyYou.</p>
        </Card>

        {/* Tabs */}
        <div>
          <Tabs active={tab} setActive={setTab}/>
          <div className="mt-5">
            {tab==='safety'   && <SafetyPanel d={d}/>}
            {tab==='wellness' && <WellnessPanel d={d}/>}
            {tab==='care'     && <CareActionsPanel d={d}/>}
            {tab==='privacy'  && <PrivacyPanel/>}
          </div>
        </div>

        {/* Footer actions + reassurance */}
        <Card hover={false} className="p-5 sm:p-6">
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div className="flex items-center gap-2.5 text-sm text-ink-700/70">
              <Icon name="lock" className="w-4 h-4 text-brand-600 shrink-0"/>
              <span>Private by design — <span className="text-ink-800 font-medium">no video is ever shared with families.</span></span>
            </div>
            <div className="flex gap-2">
              <button onClick={onDownload}
                className="inline-flex items-center gap-2 rounded-xl border border-sand-200 bg-white px-4 py-2.5 text-sm font-medium text-ink-800 hover:bg-sand-50 transition-colors">
                <Icon name="download" className="w-4 h-4"/>Download Monthly Summary
              </button>
              <button onClick={()=>setModal(true)}
                className="inline-flex items-center gap-2 rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition-colors shadow-soft">
                <Icon name="message" className="w-4 h-4"/>Message Care Team
              </button>
            </div>
          </div>
        </Card>

        <p className="text-center text-xs text-ink-700/40 pb-4">
          SafelyYou Family Trust Dashboard · Demonstration prototype with sample data · {MONTHS.find(m=>m.id===monthId).label}
        </p>
      </main>

      <MessageModal open={modal} onClose={()=>setModal(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
